{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Reset Password</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            flex-direction: column;
            text-align: center;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 380px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo {
            width: 220px;
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
        }

        h1 {
            font-size: 30px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
            margin-top: -5px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .password-container {
            position: relative;
            width: 100%;
        }

        .password-container input {
            width: 85%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        .toggle-password {
            position: absolute;
            right: 25px;
            top: 40%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }

        .password-criteria {
            font-size: 12px;
            color: #555;
            margin-top: 5px;
            text-align: left;
        }

        .password-criteria ul {
            list-style: none;
            padding: 0;
        }

        .password-criteria li {
            margin-bottom: 3px;
        }

        .password-criteria li::before {
            content: "❌";
            margin-right: 5px;
            color: red;
        }

        .password-criteria li.valid::before {
            content: "✅";
            color: green;
        }

        button {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            color: white;
            border: none;
            width: 98%;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(135deg, #fbc2eb, #a18cd1);
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 0px;
            margin-bottom: 7px;
        }
    </style>
</head>
<body>

    <img src="{% static 'images/AURA_LOGO.png' %}" alt="Logo" class="logo">
    
    <div class="form-container">
        <h1>Reset Password</h1>
        <form method="POST" id="resetPasswordForm">
            {% csrf_token %}
            
            <!-- New Password Field -->
            <div class="password-container">
                <input type="password" id="new_password" name="new_password" placeholder="Enter New Password" required>
                <span class="toggle-password" onclick="togglePassword('new_password', this)">🙈</span>
            </div>

            <div class="password-criteria">
                <ul>
                    <li id="uppercase">At least one uppercase letter</li>
                    <li id="number">At least one number</li>
                    <li id="special">At least one special character (@$!%*?&)</li>
                    <li id="length">8-15 characters long</li>
                </ul>
            </div>

            <!-- Retype Password Field -->
            <div class="password-container">
                <input type="password" id="re_password" name="re_password" placeholder="Re-type New Password" required oninput="checkPasswords()" onblur="checkPasswords()">
                <span class="toggle-password" onclick="togglePassword('re_password', this)">🙈</span>
            </div>
            <div id="passwordMatchError" class="error"></div>

            <button type="submit">Reset Password</button>
        </form>
    </div>

    <script>
        const newPasswordInput = document.getElementById('new_password');
        const rePasswordInput = document.getElementById('re_password');
        const uppercase = document.getElementById('uppercase');
        const number = document.getElementById('number');
        const special = document.getElementById('special');
        const length = document.getElementById('length');
        const passwordMatchError = document.getElementById('passwordMatchError');

        // Password validation
        newPasswordInput.addEventListener('input', function () {
            const value = newPasswordInput.value;
            /[A-Z]/.test(value) ? uppercase.classList.add('valid') : uppercase.classList.remove('valid');
            /\d/.test(value) ? number.classList.add('valid') : number.classList.remove('valid');
            /[@$!%*?&]/.test(value) ? special.classList.add('valid') : special.classList.remove('valid');
            (value.length >= 8 && value.length <= 15) ? length.classList.add('valid') : length.classList.remove('valid');
        });

        // Check if passwords match
        function checkPasswords() {
            if (newPasswordInput.value !== rePasswordInput.value) {
                passwordMatchError.textContent = "Passwords do not match.";
            } else {
                passwordMatchError.textContent = "";
            }
        }

        // Toggle password visibility
        function togglePassword(inputId, toggleIcon) {
            var inputField = document.getElementById(inputId);
            if (inputField.type === "password") {
                inputField.type = "text";
                toggleIcon.textContent = "👁️";
            } else {
                inputField.type = "password";
                toggleIcon.textContent = "🙈";
            }
        }

        // Form submission validation
        document.getElementById('resetPasswordForm').addEventListener('submit', function (e) {
            if (!(uppercase.classList.contains('valid') &&
                number.classList.contains('valid') &&
                special.classList.contains('valid') &&
                length.classList.contains('valid'))) {
                e.preventDefault();
                alert("Please fulfill all password requirements.");
            }

            if (newPasswordInput.value !== rePasswordInput.value) {
                e.preventDefault();
                alert("Passwords do not match.");
            }
        });
    </script>

</body>
</html>
